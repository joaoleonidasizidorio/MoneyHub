{% extends "base.html" %}
{% block title %}Editar Transação - Moneyhub{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto;">
    <div class="page-header" style="justify-content: center; margin-bottom: 2rem;">
        <h1 class="page-title" style="font-size: 1.5rem;">
            <i class="bi bi-pencil" style="margin-right: 0.5rem;"></i>Editar Transação
        </h1>
    </div>

    <div class="glass-panel" style="padding: 2.5rem;">
        <form method="POST">
            <div class="form-group">
                <label for="type">Tipo</label>
                <select id="type" name="type" required>
                    <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Receita</option>
                    <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Despesa</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="amount">Valor (R$)</label>
                <input type="number" step="0.01" id="amount" name="amount" value="{{ transaction.amount }}" required>
            </div>
            
            <div class="form-group">
                <label for="description">Descrição</label>
                <input type="text" id="description" name="description" value="{{ transaction.description }}" required>
            </div>
            
            <div class="form-group">
                <label for="category">Categoria</label>
                <input type="text" id="category" name="category" value="{{ transaction.category }}" required list="category-list">
                <datalist id="category-list">
                    {% for category in categories %}
                    <option value="{{ category }}">
                    {% endfor %}
                </datalist>
            </div>
            
            <div class="form-group">
                <label for="date">Data</label>
                <input type="date" id="date" name="date" value="{{ transaction.date.strftime('%Y-%m-%d') }}" required>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar Alterações</button>
                <a href="{{ url_for('transactions') }}" class="btn" style="flex: 1; background: rgba(255,255,255,0.1); color: white;">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
