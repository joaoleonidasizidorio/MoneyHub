{% extends "base.html" %}
{% block title %}Login - Moneyhub{% endblock %}

{% block auth_content %}
<div class="auth-card glass-panel">
    <div class="auth-header">
        <i class="bi bi-wallet2"></i>
        <h2>Moneyhub</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Acesse sua conta para continuar</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
        </div>
        
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required placeholder="Digite sua senha">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">
            Entrar <i class="bi bi-arrow-right"></i>
        </button>
    </form>
    

</div>
{% endblock %}
