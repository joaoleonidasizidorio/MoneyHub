{% extends "base.html" %}
{% block title %}Registro - Moneyhub{% endblock %}

{% block auth_content %}
<div class="auth-card glass-panel" style="max-width: 480px;">
    <div class="auth-header">
        <i class="bi bi-person-plus"></i>
        <h2>Criar Conta</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Junte-se ao Moneyhub e controle suas finanças</p>
    </div>
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" required placeholder="Escolha um nome de usuário">
        </div>
        
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="Seu melhor e-mail">
        </div>
        
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required placeholder="Crie uma senha forte">
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirmar Senha</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repita a senha">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">
            Registrar <i class="bi bi-check2"></i>
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary);">
        Já possui conta? <a href="{{ url_for('login') }}" style="font-weight: 600;">Faça login</a>
    </div>
</div>
{% endblock %}
