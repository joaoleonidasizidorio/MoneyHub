{% extends "base.html" %}
{% block title %}Nova Transação - Moneyhub{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto;">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap;">
        <h1 class="page-title" style="font-size: 1.5rem; margin: 0;">
            <i class="bi bi-plus-circle" style="margin-right: 0.5rem;"></i>Nova Transação
        </h1>
        
        <!-- Botão de OCR -->
        <button type="button" onclick="document.getElementById('receipt-upload').click()" class="btn" style="background: rgba(99, 102, 241, 0.2); color: var(--accent-primary); border: 1px solid var(--accent-primary); white-space: nowrap; flex-shrink: 0;">
            <i class="bi bi-camera"></i> Ler Cupom com IA
        </button>
        <input type="file" id="receipt-upload" accept="image/*" capture="environment" style="display: none;" onchange="uploadReceipt(this)">
    </div>

    <!-- Overlay de Loading do OCR -->
    <div id="ocr-loading" style="display: none; text-align: center; margin-bottom: 1rem; color: var(--accent-primary);">
        <div class="spinner-border spinner-border-sm" role="status" style="margin-right: 0.5rem;"></div>
        <span style="font-weight: 500;">Analisando cupom com IA...</span>
    </div>

    <div class="glass-panel" style="padding: 2.5rem;">
        <form method="POST">
            <div class="form-group">
                <label for="type">Tipo</label>
                <select id="type" name="type" required>
                    <option value="">Selecione o tipo...</option>
                    <option value="income">Receita</option>
                    <option value="expense">Despesa</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="amount">Valor (R$)</label>
                <input type="number" step="0.01" id="amount" name="amount" placeholder="0,00" required>
            </div>
            
            <div class="form-group">
                <label for="description">Descrição</label>
                <input type="text" id="description" name="description" placeholder="Ex: Conta de Luz" required>
            </div>
            
            <div class="form-group">
                <label for="category">Categoria</label>
                <input type="text" id="category" name="category" placeholder="Ex: Moradia" required list="category-list">
                <datalist id="category-list">
                    {% for category in categories %}
                    <option value="{{ category }}">
                    {% endfor %}
                </datalist>
            </div>
            
            <div class="form-group">
                <label for="date">Data</label>
                <!-- Using a simple text-like input for date, letting browser handle the picker. -->
                <input type="date" id="date" name="date" required>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar</button>
                <a href="{{ url_for('transactions') }}" class="btn" style="flex: 1; background: rgba(255,255,255,0.1); color: white;">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
async function uploadReceipt(input) {
    if (!input.files || input.files.length === 0) return;
    
    const file = input.files[0];
    const formData = new FormData();
    formData.append('receipt', file);
    
    const loadingDiv = document.getElementById('ocr-loading');
    loadingDiv.style.display = 'block';
    
    try {
        const response = await fetch('/api/scan_receipt', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // Auto-preencher os campos
            if (data.amount) {
                document.getElementById('amount').value = data.amount;
                document.getElementById('type').value = 'expense'; // Geralmente cupons são despesas
            }
            if (data.description) {
                document.getElementById('description').value = data.description;
            }
            if (data.date) {
                document.getElementById('date').value = data.date;
            }
            alert("Cupom analisado com sucesso!");
        } else {
            alert("Erro da IA: " + data.error);
        }
    } catch (error) {
        console.error(error);
        alert("Erro de conexão ao analisar o cupom.");
    } finally {
        loadingDiv.style.display = 'none';
        input.value = ''; // Reset file input
    }
}
</script>
{% endblock %}
