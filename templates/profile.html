{% extends "base.html" %}
{% block title %}Meu Perfil - Moneyhub{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 0 auto;">
    <div class="page-header" style="margin-bottom: 2rem;">
        <h1 class="page-title" style="font-size: 1.5rem; margin: 0;">
            <i class="bi bi-person-circle" style="margin-right: 0.5rem;"></i>Meu Perfil
        </h1>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        
        <!-- Bloco de Dados Básicos -->
        <div class="glass-panel" style="padding: 2.5rem;">
            <h3 style="margin-bottom: 1.5rem; color: var(--text-primary);">Configurações Gerais</h3>
            
            <form method="POST" enctype="multipart/form-data">
                
                <div style="text-align: center; margin-bottom: 2rem;">
                    {% if current_user.avatar %}
                        <img src="{{ url_for('static', filename=current_user.avatar) }}" alt="Avatar" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-primary); margin-bottom: 1rem;">
                    {% else %}
                        <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--bg-card); border: 3px dashed var(--border-color); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem auto; font-size: 3rem; color: var(--text-secondary);">
                            {{ current_user.username[0]|upper }}
                        </div>
                    {% endif %}
                    
                    <div class="form-group" style="text-align: left;">
                        <label for="avatar">Alterar Foto de Perfil</label>
                        <input type="file" id="avatar" name="avatar" accept="image/*" style="font-size: 0.9rem;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <input type="text" value="{{ current_user.username }}" disabled style="opacity: 0.7; cursor: not-allowed;">
                    <small style="color: var(--text-secondary);">O nome de usuário não pode ser alterado.</small>
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" value="{{ current_user.email }}" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Salvar Dados</button>
            </form>
        </div>

        <!-- Bloco de Segurança -->
        <div class="glass-panel" style="padding: 2.5rem; height: fit-content;">
            <h3 style="margin-bottom: 1.5rem; color: var(--text-primary);">Segurança e Senha</h3>
            
            <form method="POST">
                <div class="form-group">
                    <label for="current_password">Senha Atual</label>
                    <input type="password" id="current_password" name="current_password" placeholder="Digite sua senha atual">
                </div>
                
                <div class="form-group">
                    <label for="new_password">Nova Senha</label>
                    <input type="password" id="new_password" name="new_password" placeholder="Nova senha segura">
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirme a Nova Senha</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repita a nova senha">
                </div>
                
                <button type="submit" class="btn" style="width: 100%; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444;">Alterar Senha</button>
            </form>
        </div>

    </div>
</div>

<style>
    /* Responsive grid for smaller screens */
    @media (max-width: 768px) {
        div[style*="grid-template-columns"] {
            grid-template-columns: 1fr !important;
        }
    }
</style>
{% endblock %}
